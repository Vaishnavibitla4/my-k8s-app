stages:          # Order of execution
  - install
  - build
  - push
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  APP_NAME: "my-k8s-app"

# ----------------------
# Install dependencies
# ----------------------
Install_Dependencies:
  stage: install
  tags:
    - shell                 # run on local runner with Node & Docker installed
  script:
    - echo "Installing dependencies..."
    - npm install
  artifacts:
    paths:
      - node_modules/      # Preserve for later stages
    expire_in: 1h

# ----------------------
# Build Docker image
# ----------------------
Build_Docker_Image:
  stage: build
  tags:
    - shell                 # run on local runner with Docker installed
  dependencies:
    - Install_Dependencies
  script:
    - echo "Logging into Docker Hub..."
    - echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
    - echo "Building Docker image..."
    - docker build -t $APP_NAME:$CI_PIPELINE_IID .
    - docker tag $APP_NAME:$CI_PIPELINE_IID $DOCKER_HUB_USERNAME/$APP_NAME:latest

# ----------------------
# Push Docker image to Docker Hub
# ----------------------
Push_Docker_Image:
  stage: push
  tags:
    - shell
  dependencies:
    - Build_Docker_Image
  script:
    - echo "Pushing Docker image to Docker Hub..."
    - docker push $DOCKER_HUB_USERNAME/$APP_NAME:latest

# ----------------------
# Deploy to Minikube (local runner)
# ----------------------
Deploy_to_Minikube:
  stage: deploy
  tags:
    - shell           # Make sure your local runner has this tag
  before_script:
    - echo "Using local Minikube installed on Ubuntu..."
  script:
    - minikube status || minikube start --driver=docker --memory=2048 --cpus=2
    - kubectl apply -f k8s/deployment.yaml
    - kubectl apply -f k8s/service.yaml